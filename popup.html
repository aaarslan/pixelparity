                    <div class="brand-text">

        </header>

        <main class="app-main">
            <div id="loadingState" class="state-container loading-state" aria-hidden="false">
                <div class="pulse-loader">
                    <div class="pulse-dot"></div>
                    <div class="pulse-dot"></div>
                    <div class="pulse-dot"></div>
                </div>
                <p class="loading-text">Analyzing display metrics...</p>
            </div>

            <div id="errorState" class="state-container error-state hidden" aria-hidden="true">
                <div class="error-icon">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M11,15H13V17H11V15M11,7H13V13H11V7M12,2C6.47,2 2,6.5 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20Z" />
                    </svg>
                </div>
                <h2 class="error-title">Unable to Access Metrics</h2>
                <p class="error-message" id="errorMessage">This page doesn't allow metric detection</p>
                <button id="retryBtn" class="primary-btn">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z" />
                    </svg>
                    Retry Detection
                </button>
            </div>

            <div id="successState" class="state-container success-state hidden" aria-hidden="true">
                <section class="metrics-section">
                    <h2 class="section-title">
                        <svg viewBox="0 0 24 24">
                            <path d="M3,11H11V3H3M3,21H11V13H3M13,21H21V13H13M13,3V11H21V3" />
                        </svg>
                        Display Metrics
                    </h2>
                    <div id="metricsGrid" class="metrics-grid" role="list">
                    </div>
                </section>

                <section class="breakpoints-section">
                    <h2 class="section-title">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M4,6H20V16H4M20,18A2,2 0 0,0 22,16V6C22,4.89 21.1,4 20,4H4C2.89,4 2,4.89 2,6V16A2,2 0 0,0 4,18H0V20H24V18H20Z" />
                        </svg>
                        Responsive Breakpoints
                    </h2>
                    <div id="breakpointsGrid" class="breakpoints-grid">
                    </div>
                </section>

                <section class="actions-section">
                    <button id="copyJsonBtn" class="action-btn" data-action="json">
                        <div class="action-btn-content">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M13.5,16V19H10.5V16H8L12,12L16,16H13.5M13,9V3.5L18.5,9H13Z" />
                            </svg>
                            <span>Export JSON</span>
                        </div>
                        <kbd>⌘J</kbd>
                    </button>
                    <button id="copyCssBtn" class="action-btn" data-action="css">
                        <div class="action-btn-content">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M5,3L4.35,6.34H17.94L17.5,8.5H3.92L3.26,11.83H16.85L16.09,15.64L10.61,17.45L5.86,15.64L6.19,14H2.85L2.06,18L9.91,21L18.96,18L20.16,11.97L20.4,10.76L21.94,3H5Z" />
                            </svg>
                            <span>Export CSS</span>
                        </div>
                        <kbd>⌘S</kbd>
                    </button>
                    <button id="copyTableBtn" class="action-btn" data-action="table">
                        <div class="action-btn-content">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M5,4H19A2,2 0 0,1 21,6V18A2,2 0 0,1 19,20H5A2,2 0 0,1 3,18V6A2,2 0 0,1 5,4M5,8V12H11V8H5M13,8V12H19V8H13M5,14V18H11V14H5M13,14V18H19V14H13Z" />
                            </svg>
                            <span>Export Table</span>
                        </div>
                        <kbd>⌘T</kbd>
                    </button>
                </section>
            </div>
        </main>

        <aside id="settingsPanel" class="settings-panel hidden" aria-hidden="true">
            <div class="settings-header">
                <h2 class="settings-title">Settings</h2>
                <button id="closeSettingsBtn" class="icon-btn" aria-label="Close settings">
                    <svg viewBox="0 0 24 24">
                        <path

                    </svg>
                </button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label class="setting-label" for="themeToggle">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M7.5,2C5.71,3.15 4.5,5.18 4.5,7.5C4.5,9.82 5.71,11.85 7.53,13C4.46,13 2,10.54 2,7.5A5.5,5.5 0 0,1 7.5,2M19.07,3.5L20.5,4.93L4.93,20.5L3.5,19.07L19.07,3.5M12.89,5.93L11.41,5L9.97,6L10.39,4.3L9,3.24L10.75,3.12L11.33,1.47L12,3.1L13.73,3.13L12.38,4.26L12.89,5.93M9.59,9.54L8.43,8.81L7.31,9.59L7.65,8.27L6.56,7.44L7.92,7.35L8.37,6.06L8.88,7.33L10.24,7.36L9.19,8.23L9.59,9.54M19,13.5A5.5,5.5 0 0,1 13.5,19C12.28,19 11.15,18.6 10.24,17.93L17.93,10.24C18.6,11.15 19,12.28 19,13.5M14.6,20.08L17.37,18.93L17.13,22.28L14.6,20.08M18.93,17.38L20.08,14.61L22.28,17.15L18.93,17.38M20.08,12.42L18.94,9.64L22.28,9.88L20.08,12.42M9.63,18.93L12.4,20.08L9.87,22.27L9.63,18.93Z" />
                        </svg>
                        <span>Dark Theme</span>
                    </label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="setting-label" for="compactModeToggle">
                        <svg viewBox="0 0 24 24">
                            <path d="M3,15H21V13H3V15M3,19H21V17H3V19M3,11H21V9H3V11M3,5V7H21V5H3Z" />
                        </svg>
                        <span>Compact Mode</span>
                    </label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="compactModeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </aside>
    </div>
    <script src="popup.js" type="module"></script>
